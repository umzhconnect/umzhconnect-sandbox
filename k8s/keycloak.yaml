---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: cow-sandbox
data:
  realm-export.json: |
    {}  # Replace with contents of infrastructure/keycloak/realm-export.json

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: cow-sandbox
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev", "--import-realm"]
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: jdbc:postgresql://postgres-kc:5432/keycloak
            - name: KC_DB_USERNAME
              value: keycloak
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cow-sandbox-secrets
                  key: keycloak-db-password
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cow-sandbox-secrets
                  key: keycloak-admin-password
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY
              value: edge
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true
          readinessProbe:
            httpGet:
              path: /realms/umzh-sandbox/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: cow-sandbox
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak-ingress
  namespace: cow-sandbox
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
spec:
  rules:
    - host: auth.sandbox.umzhconnect.ch
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
