#   --from-literal=keycloak-admin-password=CHANGE_ME \
#   --from-literal=placer-client-secret=CHANGE_ME \
#   --from-literal=fulfiller-client-secret=CHANGE_ME \
#   --from-literal=hapi-db-password=CHANGE_ME \
#   --dry-run=client -o yaml | kubeseal > k8s/sealed-secrets.yaml
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cow-sandbox-secrets
  namespace: cow-sandbox
type: Opaque
stringData:
  keycloak-db-password: CHANGE_ME
  keycloak-admin-password: CHANGE_ME
  hapi-db-password: CHANGE_ME
  placer-client-secret: placer-secret-change-me
  fulfiller-client-secret: fulfiller-secret-change-me
  backend-client-secret: backend-secret-change-me
