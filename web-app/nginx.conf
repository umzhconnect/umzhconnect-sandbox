server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # L2 private keys — served from the shared l2-keys Docker volume.
    # Intentionally public (sandbox teaching tool): mirrors how L1's client_secret
    # is visible in DevTools. Keys are RSA-2048, generated fresh at each stack start.
    location /l2-keys/ {
        alias /l2-keys/;
        add_header Cache-Control "no-store";
        add_header Content-Type "text/plain";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
