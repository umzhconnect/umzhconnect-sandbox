server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing - serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # env-config.js is written at container start with runtime env vars — never cache it
    location = /env-config.js {
        add_header Cache-Control "no-store";
    }

    # Cache static assets (hashed filenames — safe to cache forever)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # L2 private keys — committed demo material from services/keys/, bind-mounted
    # at /l2-keys/. Intentionally public (sandbox teaching tool): mirrors how
    # L1's client_secret is visible in DevTools. See services/keys/README.md for
    # the trust model. The corresponding public-key JWK Sets are published by
    # each party's external APISIX gateway at http://localhost:8081|8083/jwks.json
    # — same origin as the FHIR API. Keycloak fetches it during private_key_jwt
    # verification.
    location /l2-keys/ {
        alias /l2-keys/;
        add_header Cache-Control "no-store";
        add_header Content-Type "text/plain";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
