# =============================================================================
# Test Runner — extends the main docker-compose.yml
#
# Usage (CI):
#   docker compose -f docker-compose.yml -f tests/docker-compose.test.yml up \
#     --build --abort-on-container-exit --exit-code-from test-runner
#
# The test-runner service waits for all services, acquires tokens, and runs
# every Hurl test file in sequence. Exit code 0 = all passed, 1 = failures.
# =============================================================================

services:
  test-runner:
    build:
      context: .
      dockerfile: tests/Dockerfile.test-runner
    container_name: umzh-test-runner
    working_dir: /tests
    volumes:
      - ./tests:/tests
    entrypoint: ["/bin/sh", "/tests/scripts/run-tests.sh"]
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ISSUER: http://localhost:8180/realms/umzh-connect
      APISIX_PLACER_URL: http://apisix-placer-internal:9080
      APISIX_PLACER_EXT_URL: http://apisix-placer-external:9080
      APISIX_FULFILLER_URL: http://apisix-fulfiller-internal:9080
      APISIX_FULFILLER_EXT_URL: http://apisix-fulfiller-external:9080
      HAPI_FHIR_URL: http://hapi-fhir:8080
      REGISTRY_URL: http://nginx-proxy:84
      ORG_CANONICAL_URL: ${REGISTRY_PUBLIC_URL:-http://localhost:8084}
      OPA_PLACER_URL: http://opa-placer:8181
      OPA_FULFILLER_URL: http://opa-fulfiller:8181
      ADMIN_API_URL: http://admin-api:9000
      WEB_APP_URL: http://web-app:80
      KEY_CUSTODIAN_PLACER_URL: http://key-custodian-placer:8000
      KEY_CUSTODIAN_FULFILLER_URL: http://key-custodian-fulfiller:8000
    depends_on:
      apisix-placer-internal:
        condition: service_healthy
      apisix-fulfiller-internal:
        condition: service_healthy
      apisix-placer-external:
        condition: service_healthy
      apisix-fulfiller-external:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully
      web-app:
        condition: service_started
      nginx-proxy:
        condition: service_started
      key-custodian-placer:
        condition: service_started
      key-custodian-fulfiller:
        condition: service_started
    networks:
      - umzh-net
