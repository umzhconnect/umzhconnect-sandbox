name: Integration Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack and run integration tests
        run: |
          # Start all services detached — avoids --abort-on-container-exit firing
          # when seed-loader (a one-shot container) exits before test-runner starts.
          docker compose \
            -f docker-compose.yml \
            -f tests/docker-compose.test.yml \
            up --build --detach

          # Block until test-runner exits; propagate its exit code.
          docker compose \
            -f docker-compose.yml \
            -f tests/docker-compose.test.yml \
            wait test-runner

      - name: Show hurl test results
        if: always()
        run: |
          echo "## Hurl Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FOUND=0
          for f in tests/reports/*.xml; do
            if [ -f "$f" ]; then
              FOUND=1
              echo "### $f" >> $GITHUB_STEP_SUMMARY
              echo '```xml' >> $GITHUB_STEP_SUMMARY
              cat "$f" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          done
          if [ "$FOUND" = "0" ]; then
            echo "⚠️ No XML reports found at tests/reports/" >> $GITHUB_STEP_SUMMARY
            echo "Checking alternate paths..." >> $GITHUB_STEP_SUMMARY
            ls -la tests/ >> $GITHUB_STEP_SUMMARY 2>&1 || echo "tests/ not found" >> $GITHUB_STEP_SUMMARY
            ls -la tests/reports/ >> $GITHUB_STEP_SUMMARY 2>&1 || echo "tests/reports/ not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Print test-runner output
        if: always()
        run: |
          echo "=== test-runner logs ==="
          docker compose \
            -f docker-compose.yml \
            -f tests/docker-compose.test.yml \
            logs --no-color --tail=300 test-runner 2>&1 | tail -200 || true

      - name: Print OPA and APISIX logs on failure
        if: failure()
        run: |
          echo "=== opa-placer logs (last 50) ==="
          docker compose -f docker-compose.yml -f tests/docker-compose.test.yml logs --no-color --tail=50 opa-placer 2>&1 || true
          echo "=== apisix-placer-external logs (last 30) ==="
          docker compose -f docker-compose.yml -f tests/docker-compose.test.yml logs --no-color --tail=30 apisix-placer-external 2>&1 || true
          echo "=== seed-loader logs (last 20) ==="
          docker compose -f docker-compose.yml -f tests/docker-compose.test.yml logs --no-color --tail=20 seed-loader 2>&1 || true

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/docker-compose.test.yml \
            logs --no-color 2>&1 | tee /tmp/compose-logs.txt

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: /tmp/compose-logs.txt

      - name: Upload Hurl test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hurl-reports
          path: tests/reports/*.xml
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: |
          docker compose \
            -f docker-compose.yml \
            -f tests/docker-compose.test.yml \
            down --volumes --remove-orphans
