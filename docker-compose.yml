services:
  # ===========================================================================
  # PostgreSQL - Shared database for HAPI FHIR and Keycloak
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: umzh-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - '5431:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  # ===========================================================================
  # Keycloak - Authorization Server (shared by both parties)
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: umzh-keycloak
    command: start-dev --import-realm --features=dynamic-scopes
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: 'http://localhost:8180'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: 'true'
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./services/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - '${KEYCLOAK_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 25 exposes /health/ready on the management port 9000
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;grep -q '200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - umzh-net

  # ===========================================================================
  # HAPI FHIR Server - URL-based multi-tenancy
  #   /fhir/placer    -> HospitalP partition
  #   /fhir/fulfiller -> HospitalF partition
  # ===========================================================================
  hapi-fhir:
    image: hapiproject/hapi:v7.4.0
    container_name: umzh-hapi-fhir
    environment:
      SPRING_CONFIG_LOCATION: file:///app/config/application.yaml
    volumes:
      - ./services/hapi-fhir/application.yaml:/app/config/application.yaml
    ports:
      - '${HAPI_FHIR_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy
    # Note: hapiproject/hapi image is distroless (no shell), so Docker
    # healthchecks are not possible. Dependent services use their own
    # retry logic to wait for HAPI FHIR readiness.
    networks:
      - umzh-net

  # ===========================================================================
  # nginx-proxy — nginx reverse/rewriting proxy in front of HAPI FHIR.
  #   Ports 80–83: rewrites HAPI self-links to the correct APISIX gateway URL.
  # ===========================================================================
  nginx-proxy:
    image: nginx:alpine
    container_name: umzh-nginx-proxy
    volumes:
      - ./services/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      hapi-fhir:
        condition: service_started
    networks:
      - umzh-net

  # ===========================================================================
  # OPA - Policy Engine for HospitalP (Placer)
  # ===========================================================================
  opa-placer:
    image: openpolicyagent/opa:0.70.0
    platform: linux/amd64
    container_name: umzh-opa-placer
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
      - /config.json
    volumes:
      - ./services/opa/policies:/policies
      - ./services/opa/config-placer.json:/config.json
    ports:
      - '${OPA_PLACER_PORT}:8181'
    networks:
      - umzh-net

  # ===========================================================================
  # OPA - Policy Engine for HospitalF (Fulfiller)
  # ===========================================================================
  opa-fulfiller:
    image: openpolicyagent/opa:0.70.0
    platform: linux/amd64
    container_name: umzh-opa-fulfiller
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
      - /config.json
    volumes:
      - ./services/opa/policies:/policies
      - ./services/opa/config-fulfiller.json:/config.json
    ports:
      - '${OPA_FULFILLER_PORT}:8181'
    networks:
      - umzh-net


  # ===========================================================================
  # APISIX API Gateways
  #
  # Standalone mode (config_provider: yaml) — no etcd dependency.
  # Each instance mounts its own config.yaml + apisix.yaml from services/apisix/.
  #
  #   apisix-placer-internal    (internal) — placer reads own + proxies fulfiller data
  #   apisix-placer-external    (external) — consumed by fulfiller to read placer data
  #   apisix-fulfiller-internal (internal) — fulfiller reads own + proxies placer data
  #   apisix-fulfiller-external (external) — consumed by placer to read fulfiller data
  # ===========================================================================
  apisix-placer-internal:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-placer-internal
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      PARTNER_EXTERNAL_URL: "http://localhost:${APISIX_FULFILLER_EXTERNAL_PORT}"
      OWN_URL: "http://localhost:${APISIX_PLACER_PORT}"
      CLIENT_ID: "${PLACER_CLIENT_ID}"
      CLIENT_SECRET: "${PLACER_CLIENT_SECRET}"
    volumes:
      - ./services/apisix/placer-internal/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/placer-internal/apisix.yaml:/templates/apisix.yaml:ro
      - ./services/apisix/placer-internal/entrypoint.sh:/entrypoint.sh:ro
      - ./services/apisix/plugins/umzh-role-check.lua:/usr/local/apisix/apisix/plugins/umzh-role-check.lua:ro
    ports:
      - '${APISIX_PLACER_PORT}:9080'
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-placer:
        condition: service_started
      apisix-fulfiller-external:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  apisix-placer-external:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-placer-external
    volumes:
      - ./services/apisix/placer-external/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/placer-external/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - '${APISIX_PLACER_EXTERNAL_PORT}:9080'
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-placer:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  apisix-fulfiller-internal:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-fulfiller-internal
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      PARTNER_EXTERNAL_URL: "http://localhost:${APISIX_PLACER_EXTERNAL_PORT}"
      OWN_URL: "http://localhost:${APISIX_FULFILLER_PORT}"
      CLIENT_ID: "${FULFILLER_CLIENT_ID}"
      CLIENT_SECRET: "${FULFILLER_CLIENT_SECRET}"
    volumes:
      - ./services/apisix/fulfiller-internal/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/fulfiller-internal/apisix.yaml:/templates/apisix.yaml:ro
      - ./services/apisix/fulfiller-internal/entrypoint.sh:/entrypoint.sh:ro
      - ./services/apisix/plugins/umzh-role-check.lua:/usr/local/apisix/apisix/plugins/umzh-role-check.lua:ro
    ports:
      - '${APISIX_FULFILLER_PORT}:9080'
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-fulfiller:
        condition: service_started
      apisix-placer-external:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  apisix-fulfiller-external:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-fulfiller-external
    volumes:
      - ./services/apisix/fulfiller-external/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/fulfiller-external/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - '${APISIX_FULFILLER_EXTERNAL_PORT}:9080'
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-fulfiller:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  # ===========================================================================
  # Seed Loader - Creates partitions and loads FHIR data into each partition
  # ===========================================================================
  seed-loader:
    build:
      context: ./services/seed
      dockerfile: Dockerfile
    container_name: umzh-seed-loader
    environment:
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      PLACER_EXTERNAL_URL: ${VITE_PLACER_EXTERNAL_URL:-http://localhost:8081}
      FULFILLER_EXTERNAL_URL: ${VITE_FULFILLER_EXTERNAL_URL:-http://localhost:8083}
    volumes:
      - ./services/seed:/seed
    depends_on:
      hapi-fhir:
        condition: service_started
    networks:
      - umzh-net

  # ===========================================================================
  # Reseed API - Admin utility to expunge + reload all FHIR seed data
  # ===========================================================================
  reseed-api:
    build:
      context: ./services/reseed-api
      dockerfile: Dockerfile
    container_name: umzh-reseed-api
    environment:
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      PLACER_EXTERNAL_URL: ${VITE_PLACER_EXTERNAL_URL:-http://localhost:8081}
      FULFILLER_EXTERNAL_URL: ${VITE_FULFILLER_EXTERNAL_URL:-http://localhost:8083}
    volumes:
      - ./services/seed/bundles:/seed/bundles:ro
    ports:
      - '9001:9001'
    depends_on:
      hapi-fhir:
        condition: service_started
    networks:
      - umzh-net

  # ===========================================================================
  # Web Application - React SPA
  # nginx routes each party's API paths to the correct APISIX instance
  # ===========================================================================
  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: umzh-web-app
    ports:
      - '${WEB_APP_PORT}:80'
    depends_on:
      apisix-placer-internal:
        condition: service_healthy
      apisix-fulfiller-internal:
        condition: service_healthy
    networks:
      - umzh-net

volumes:
  postgres_data:

networks:
  umzh-net:
    driver: bridge
