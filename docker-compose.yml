services:
  # ===========================================================================
  # PostgreSQL - Shared database for HAPI FHIR and Keycloak
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: umzh-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  # ===========================================================================
  # Keycloak mapper builder — compiles the FhirContextMapper JAR once and
  # places it in services/keycloak/providers/ for Keycloak to pick up.
  # ===========================================================================
  keycloak-mapper-build:
    image: maven:3.9-eclipse-temurin-17
    container_name: umzh-keycloak-mapper-build
    environment:
      MAVEN_OPTS: -Djava.net.preferIPv4Stack=true
    volumes:
      - ./services/keycloak/mapper:/app
      - ./services/keycloak/providers:/providers
      - keycloak_m2_cache:/root/.m2
    working_dir: /app
    command: >
      sh -c "mvn -B ${MAVEN_FLAGS:-} package -DskipTests -q &&
             cp target/umzh-fhir-context-mapper-*.jar /providers/ &&
             echo 'FhirContextMapper JAR installed.'"
    networks:
      - umzh-net

  # ===========================================================================
  # Keycloak - Authorization Server (shared by both parties)
  # ===========================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: umzh-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Resolved into realm-export.json at import time via Keycloak ${VAR}
      # placeholder substitution (single source of truth = .env).
      WEB_APP_PUBLIC_URL: ${WEB_APP_PUBLIC_URL:-http://localhost:3000}
      PLACER_CLIENT_SECRET: ${PLACER_CLIENT_SECRET:-placer-secret-2025}
      FULFILLER_CLIENT_SECRET: ${FULFILLER_CLIENT_SECRET:-fulfiller-secret-2025}
      PLACER_USER_PASSWORD: ${PLACER_USER_PASSWORD:-placer123}
      FULFILLER_USER_PASSWORD: ${FULFILLER_USER_PASSWORD:-fulfiller123}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD:-admin123}
      # L2 client JWKS endpoints Keycloak fetches to verify private_key_jwt.
      # Internal Docker address by default; public partner subdomains in prod.
      PLACER_JWKS_URL: ${PLACER_JWKS_URL:-http://apisix-placer-external:9080/jwks.json}
      FULFILLER_JWKS_URL: ${FULFILLER_JWKS_URL:-http://apisix-fulfiller-external:9080/jwks.json}
      KC_HEALTH_ENABLED: 'true'
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: 'http://localhost:8180'
      KC_HOSTNAME_STRICT: 'false'
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: 'true'
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./services/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - ./services/keycloak/providers:/opt/keycloak/providers
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-mapper-build:
        condition: service_completed_successfully
    healthcheck:
      # Keycloak 26 exposes /health/ready on the management port 9000
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/127.0.0.1/9000;echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3;grep -q '200' <&3",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - umzh-net

  # ===========================================================================
  # HAPI FHIR Server - URL-based multi-tenancy
  #   /fhir/placer    -> HospitalP partition
  #   /fhir/fulfiller -> HospitalF partition
  # ===========================================================================
  hapi-fhir:
    image: hapiproject/hapi:v8.10.0-1
    container_name: umzh-hapi-fhir
    environment:
      SPRING_CONFIG_LOCATION: file:///app/config/application.yaml
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./services/hapi-fhir/application.yaml:/app/config/application.yaml
    depends_on:
      postgres:
        condition: service_healthy
    # Note: hapiproject/hapi image is distroless (no shell), so Docker
    # healthchecks are not possible. Dependent services use their own
    # retry logic to wait for HAPI FHIR readiness.
    networks:
      - umzh-net

  # ===========================================================================
  # nginx-proxy — nginx reverse/rewriting proxy in front of HAPI FHIR.
  #   Ports 80–83: rewrites HAPI self-links to the correct APISIX gateway URL.
  #   Port 84:     registry gateway — public, no auth, routes to /fhir/registry/
  # ===========================================================================
  nginx-proxy:
    image: nginx:alpine
    container_name: umzh-nginx-proxy
    volumes:
      - ./services/nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/nginx-proxy/templates:/etc/nginx/templates:ro
    environment:
      - VITE_PLACER_URL
      - VITE_PLACER_EXTERNAL_URL
      - VITE_FULFILLER_URL
      - VITE_FULFILLER_EXTERNAL_URL
      - VITE_REGISTRY_URL
    ports:
      - '${REGISTRY_PORT:-8084}:84'
    depends_on:
      hapi-fhir:
        condition: service_started
      # nginx resolves every upstream host when it loads its config; the port-85
      # onboarding block proxies to admin-api, so admin-api must be resolvable
      # (started) first or nginx aborts and takes down all server blocks
      # (registry + the 80-83 self-link rewriters the APISIX gateways proxy through).
      admin-api:
        condition: service_started
    networks:
      - umzh-net

  # ===========================================================================
  # Key Custodians — one per party. Same image; mount source + env differ.
  #
  # Each container holds exactly one party's L2 private key + JWK Set and
  # exposes:
  #   GET  /jwks.json   public JWK Set — fronted by the party's external APISIX
  #   POST /sign        mints an RS256 private_key_jwt client assertion
  #                     (DEMO ONLY — no auth; see services/key-custodian/README.md)
  #
  # Host ports allow tests/scripts/get-token.sh to mint assertions locally; in
  # production the custodian would be internal-only behind mTLS.
  # ===========================================================================
  key-custodian-placer:
    build:
      context: ./services/key-custodian
      dockerfile: Dockerfile
    container_name: umzh-key-custodian-placer
    environment:
      PARTY: placer
      CLIENT_ID: ${PLACER_L2_CLIENT_ID}
      KID: placer-l2
      KEYCLOAK_AUDIENCE: "http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token"
    volumes:
      - ./services/keys/placer-l2.key:/keys/private.key:ro
      - ./services/keys/placer-l2.jwks.json:/keys/jwks.json:ro
    networks:
      - umzh-net

  key-custodian-fulfiller:
    build:
      context: ./services/key-custodian
      dockerfile: Dockerfile
    container_name: umzh-key-custodian-fulfiller
    environment:
      PARTY: fulfiller
      CLIENT_ID: ${FULFILLER_L2_CLIENT_ID}
      KID: fulfiller-l2
      KEYCLOAK_AUDIENCE: "http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}/protocol/openid-connect/token"
    volumes:
      - ./services/keys/fulfiller-l2.key:/keys/private.key:ro
      - ./services/keys/fulfiller-l2.jwks.json:/keys/jwks.json:ro
    networks:
      - umzh-net

  # ===========================================================================
  # OPA - Policy Engine for HospitalP (Placer)
  # ===========================================================================
  opa-placer:
    image: openpolicyagent/opa:0.70.0
    platform: linux/amd64
    container_name: umzh-opa-placer
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
      - /config.json
    volumes:
      - ./services/opa/policies:/policies
      - ./services/opa/config-placer.json:/config.json
    networks:
      - umzh-net

  # ===========================================================================
  # OPA - Policy Engine for HospitalF (Fulfiller)
  # ===========================================================================
  opa-fulfiller:
    image: openpolicyagent/opa:0.70.0
    platform: linux/amd64
    container_name: umzh-opa-fulfiller
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - --log-level=info
      - /policies
      - /config.json
    volumes:
      - ./services/opa/policies:/policies
      - ./services/opa/config-fulfiller.json:/config.json
    networks:
      - umzh-net


  # ===========================================================================
  # APISIX API Gateways
  #
  # Standalone mode (config_provider: yaml) — no etcd dependency.
  # All four instances share two apisix.yaml templates (internal/external) from
  # services/apisix/. PARTY, PARTNER, and NGINX_OWN_PORT are injected via env
  # and substituted at container start by the shared entrypoint.sh.
  #
  #   apisix-placer-internal    (internal) — placer reads own + proxies fulfiller data
  #   apisix-placer-external    (external) — consumed by fulfiller to read placer data
  #   apisix-fulfiller-internal (internal) — fulfiller reads own + proxies placer data
  #   apisix-fulfiller-external (external) — consumed by placer to read fulfiller data
  # ===========================================================================
  apisix-placer-internal:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-placer-internal
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      # Internal gateway serves only this party's own partition. The web-app
      # authenticates cross-party calls itself and talks to the partner's
      # external gateway directly.
      PARTY: "placer"
      NGINX_OWN_PORT: "80"
    volumes:
      - ./services/apisix/internal/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/internal/apisix.yaml:/templates/apisix.yaml:ro
      - ./services/apisix/entrypoint.sh:/entrypoint.sh:ro
      - ./services/apisix/plugins/umzh-role-check.lua:/usr/local/apisix/apisix/plugins/umzh-role-check.lua:ro
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-placer:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  apisix-placer-external:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-placer-external
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      PARTY: "placer"
      NGINX_OWN_PORT: "81"
    volumes:
      - ./services/apisix/external/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/external/apisix.yaml:/templates/apisix.yaml:ro
      - ./services/apisix/entrypoint.sh:/entrypoint.sh:ro
      - ./services/apisix/plugins/umzh-task-requester-inject.lua:/usr/local/apisix/apisix/plugins/umzh-task-requester-inject.lua:ro
      - ./services/apisix/plugins/umzh-capability-guard.lua:/usr/local/apisix/apisix/plugins/umzh-capability-guard.lua:ro
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-placer:
        condition: service_started
      # The /jwks.json route proxies to this party's key custodian.
      key-custodian-placer:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  apisix-fulfiller-internal:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-fulfiller-internal
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      # Internal gateway serves only this party's own partition. The web-app
      # authenticates cross-party calls itself and talks to the partner's
      # external gateway directly.
      PARTY: "fulfiller"
      NGINX_OWN_PORT: "82"
    volumes:
      - ./services/apisix/internal/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/internal/apisix.yaml:/templates/apisix.yaml:ro
      - ./services/apisix/entrypoint.sh:/entrypoint.sh:ro
      - ./services/apisix/plugins/umzh-role-check.lua:/usr/local/apisix/apisix/plugins/umzh-role-check.lua:ro
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-fulfiller:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  apisix-fulfiller-external:
    image: apache/apisix:3.9.0-debian
    container_name: umzh-apisix-fulfiller-external
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      PARTY: "fulfiller"
      NGINX_OWN_PORT: "83"
    volumes:
      - ./services/apisix/external/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./services/apisix/external/apisix.yaml:/templates/apisix.yaml:ro
      - ./services/apisix/entrypoint.sh:/entrypoint.sh:ro
      - ./services/apisix/plugins/umzh-task-requester-inject.lua:/usr/local/apisix/apisix/plugins/umzh-task-requester-inject.lua:ro
      - ./services/apisix/plugins/umzh-capability-guard.lua:/usr/local/apisix/apisix/plugins/umzh-capability-guard.lua:ro
    depends_on:
      hapi-fhir:
        condition: service_started
      nginx-proxy:
        condition: service_started
      keycloak:
        condition: service_healthy
      opa-fulfiller:
        condition: service_started
      # The /jwks.json route proxies to this party's key custodian.
      key-custodian-fulfiller:
        condition: service_started
    healthcheck:
      test: ['CMD', '/bin/bash', '-c', "exec 3<>/dev/tcp/127.0.0.1/9080;echo -e 'GET /__health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3;grep -q '200' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - umzh-net

  # ===========================================================================
  # Seed Loader - Creates partitions and loads FHIR data into each partition
  # ===========================================================================
  seed-loader:
    build:
      context: ./services/seed
      dockerfile: Dockerfile
    container_name: umzh-seed-loader
    environment:
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      PLACER_EXTERNAL_URL: ${VITE_PLACER_EXTERNAL_URL:-http://localhost:8081}
      FULFILLER_EXTERNAL_URL: ${VITE_FULFILLER_EXTERNAL_URL:-http://localhost:8083}
      REGISTRY_EXTERNAL_URL: ${VITE_REGISTRY_URL:-http://localhost:8084}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      PLACER_USER_PASSWORD: ${PLACER_USER_PASSWORD}
      FULFILLER_USER_PASSWORD: ${FULFILLER_USER_PASSWORD}
      ADMIN_USER_PASSWORD: ${ADMIN_USER_PASSWORD}
    volumes:
      - ./services/seed:/seed
    depends_on:
      hapi-fhir:
        condition: service_started
      keycloak:
        condition: service_healthy
    networks:
      - umzh-net

  # ===========================================================================
  # Admin API - Merged admin surface (formerly onboarding-api + reseed-api)
  #   POST /reseed                expunge + reload all FHIR seed data
  #   POST /invites, /register    self-service user onboarding
  #   GET/POST /clients           M2M client provisioning
  # Privileged routes are gated by Keycloak introspection + the `admin` role.
  # ===========================================================================
  admin-api:
    build:
      context: ./services/admin-api
      dockerfile: Dockerfile
    container_name: umzh-admin-api
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      # Public Keycloak URL used in token-endpoint values returned to clients.
      KEYCLOAK_PUBLIC_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8180}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      ONBOARDING_CLIENT_ID: onboarding-client
      ONBOARDING_CLIENT_SECRET: ${ONBOARDING_CLIENT_SECRET}
      FHIR_BASE_URL: http://hapi-fhir:8080/fhir
      PLACER_EXTERNAL_URL: ${VITE_PLACER_EXTERNAL_URL:-http://localhost:8081}
      FULFILLER_EXTERNAL_URL: ${VITE_FULFILLER_EXTERNAL_URL:-http://localhost:8083}
      REGISTRY_EXTERNAL_URL: ${VITE_REGISTRY_URL:-http://localhost:8084}
      # Restricts CORS to the SPA origin — must match the public web-app URL.
      WEB_APP_PUBLIC_URL: ${WEB_APP_PUBLIC_URL:-http://localhost:3000}
      PORT: 9000
    volumes:
      - ./services/seed/bundles:/seed/bundles:ro
      - admin_data:/data
    depends_on:
      keycloak:
        condition: service_healthy
      hapi-fhir:
        condition: service_started
    networks:
      - umzh-net

  # ===========================================================================
  # Web Application - React SPA
  # nginx routes each party's API paths to the correct APISIX instance
  # ===========================================================================
  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: umzh-web-app
    environment:
      - VITE_KEYCLOAK_URL
      - VITE_KEYCLOAK_REALM
      - VITE_KEYCLOAK_CLIENT_ID
      - VITE_PLACER_URL
      - VITE_PLACER_EXTERNAL_URL
      - VITE_FULFILLER_URL
      - VITE_FULFILLER_EXTERNAL_URL
      - VITE_REGISTRY_URL
      - VITE_API_BASE_URL
      - VITE_ADMIN_API_URL
    volumes:
      # Bind-mount the committed demo private keys (see services/keys/README.md).
      # The web-app's nginx serves these at /l2-keys/ so the browser (Web Crypto)
      # and the test runner can fetch them — same source the APISIX signers use.
      - ./services/keys:/l2-keys:ro
    depends_on:
      apisix-placer-internal:
        condition: service_healthy
      apisix-fulfiller-internal:
        condition: service_healthy
      seed-loader:
        condition: service_completed_successfully
    networks:
      - umzh-net

  # Workflow orchestration (Kestra) is a per-party concern and lives in
  # party-deployment/ (the single-party deployment unit), not in this two-party
  # sandbox. See party-deployment/ for the Kestra instance, flow, flow-loader,
  # and the Arazzo/OpenAPI workflow specs.

volumes:
  postgres_data:
  keycloak_m2_cache:
  admin_data:

networks:
  umzh-net:
    driver: bridge
