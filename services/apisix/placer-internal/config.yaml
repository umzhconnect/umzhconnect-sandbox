apisix:
  node_listen: 9080
  enable_ipv6: false

nginx_config:
  http_configuration_snippet: |
    server {
      listen 127.0.0.1:8180;
      location / {
        proxy_pass http://keycloak:8080;
      }
    }

plugins:
  - cors
  - openid-connect
  - opa
  - proxy-rewrite
  - response-rewrite
  - serverless-pre-function
  - serverless-post-function
  - umzh-role-check

deployment:
  role: data_plane
  role_data_plane:
    config_provider: yaml
