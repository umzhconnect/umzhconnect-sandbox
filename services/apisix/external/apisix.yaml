routes:
  # ─── Health check ────────────────────────────────────────────────────
  - id: health
    uri: /__health
    methods: [GET]
    priority: 100
    plugins:
      serverless-pre-function:
        phase: access
        functions:
          - |
            return function(conf, ctx)
              ngx.header["Content-Type"] = "application/json"
              ngx.say('{"status":"ok"}')
              return ngx.exit(200)
            end

  # ─── Public JWKS endpoint — NO auth, NO OPA ──────────────────────────
  # The external gateway is the hospital's public face: partner hospitals'
  # IdPs hit it to verify our private_key_jwt client assertions. We carve
  # one unauthenticated path out of the otherwise auth-gated surface so the
  # JWKS lives at the same origin as the FHIR API (the SMART Backend
  # Services discovery shape — jwks_uri co-located with the FHIR base).
  #
  # The actual file is served by nginx-proxy from services/keys/; we just
  # proxy to it so the public URL is http://localhost:808{1,3}/jwks.json.
  # That way the external gateway container itself never needs to mount
  # the keys directory.
  - id: ext-jwks
    uri: /jwks.json
    methods: [GET]
    priority: 100
    upstream_id: jwks-${PARTY}

  # ─── Task list — JWT + scope (system/Task.s) + server-side requester filter ─
  # Scope-gated to require .s, and the umzh-task-requester-inject plugin appends
  # ?requester=<organization_reference> from the caller's token so HAPI only
  # returns Tasks where the caller is the named requester. The caller cannot
  # override this filter — args.requester is set after the request is parsed.
  - id: ext-task-list
    uri: /fhir/Task
    methods: [GET]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-capability-guard:
        allow_params: ["owner", "requester", "status", "_id"]
        allow_includes:
          - "Task:ch-umzhconnectig-task-inputreference"
          - "Task:ch-umzhconnectig-task-outputreference"
          - "Task:ch-umzhconnectig-task-outputcanonical"
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      umzh-task-requester-inject: {}
      proxy-rewrite:
        uri: /fhir/${PARTY}/Task

  # ─── Task create — JWT + OPA (Rule 1c: realm role + system/Task.c scope) ─
  - id: ext-task-create
    uri: /fhir/Task
    methods: [POST]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      proxy-rewrite:
        uri: /fhir/${PARTY}/Task

  # ─── Task update — JWT + patchable-field guard (capability-guard) + OPA ─
  - id: ext-task-update
    uri: /fhir/Task/*
    methods: [PATCH]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-capability-guard:
        patchable_fields: ["input", "owner", "focus", "businessStatus"]
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      proxy-rewrite:
        regex_uri: ["^/fhir/Task/(.+)$", "/fhir/${PARTY}/Task/$1"]

  # ─── FHIR read by ID — capability-guard (no params) + OPA consent gate ─
  - id: ext-fhir-read
    uri: /fhir/*
    methods: [GET]
    vars:
      - - "uri"
        - "~~"
        - "^/fhir/[^/]+/[^/]+$"
    priority: 5
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-capability-guard:
        allow_params: []
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

  # ─── ServiceRequest search — capability-guard (_id required, enumerated
  #     includes) + OPA consent gate. Only ServiceRequest is searchable
  #     cross-party here; Task search is handled by ext-task-list above.
  #     Clinical leaf types and QuestionnaireResponse have no search route, so
  #     a search on them falls through to default-deny (404). QR search is
  #     intentionally deferred until its OPA context-gating rule lands.
  - id: ext-sr-search
    uri: /fhir/ServiceRequest
    methods: [GET]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-capability-guard:
        require: ["_id"]
        allow_params: ["_id"]
        allow_includes:
          - "ServiceRequest:patient"
          - "ServiceRequest:subject"
          - "ServiceRequest:requester"
          - "ServiceRequest:ch-umzhconnectig-servicerequest-reasonreference"
          - "ServiceRequest:ch-umzhconnectig-servicerequest-supportinginfo"
          - "ServiceRequest:ch-umzhconnectig-servicerequest-insurance"
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

upstreams:
  - id: hapi-${PARTY}
    nodes:
      "nginx-proxy:${NGINX_OWN_PORT}": 1
    type: roundrobin

  # Internal-only static-file server (nginx-proxy server block on port 85/86)
  # holding the party's JWK Set from services/keys/${PARTY}-l2.jwks.json.
  - id: jwks-${PARTY}
    nodes:
      "nginx-proxy:${JWKS_NGINX_PORT}": 1
    type: roundrobin

global_rules:
  - id: 1
    plugins:
      cors:
        allow_origins: "**"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,Accept,X-Tenant"
        expose_headers: "Content-Length,Content-Type"
        max_age: 43200
        allow_credential: true

#END
