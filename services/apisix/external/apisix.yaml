routes:
  # ─── Health check ────────────────────────────────────────────────────
  - id: health
    uri: /__health
    methods: [GET]
    priority: 100
    plugins:
      serverless-pre-function:
        phase: access
        functions:
          - |
            return function(conf, ctx)
              ngx.header["Content-Type"] = "application/json"
              ngx.say('{"status":"ok"}')
              return ngx.exit(200)
            end

  # ─── Public JWKS endpoint — NO auth, NO OPA ──────────────────────────
  # The external gateway is the hospital's public face: partner hospitals'
  # IdPs hit it to verify our private_key_jwt client assertions. We carve
  # one unauthenticated path out of the otherwise auth-gated surface so the
  # JWKS lives at the same origin as the FHIR API (the SMART Backend
  # Services discovery shape — jwks_uri co-located with the FHIR base).
  #
  # The actual file is served by nginx-proxy from services/keys/; we just
  # proxy to it so the public URL is http://localhost:808{1,3}/jwks.json.
  # That way the external gateway container itself never needs to mount
  # the keys directory.
  - id: ext-jwks
    uri: /jwks.json
    methods: [GET]
    priority: 100
    upstream_id: jwks-${PARTY}

  # ─── Task list — JWT only, no OPA (workflow resource) ────────────────
  - id: ext-task-list
    uri: /fhir/Task
    methods: [GET]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      proxy-rewrite:
        uri: /fhir/${PARTY}/Task

  # ─── Task create — JWT only, no OPA ──────────────────────────────────
  - id: ext-task-create
    uri: /fhir/Task
    methods: [POST]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      proxy-rewrite:
        uri: /fhir/${PARTY}/Task

  # ─── Task update — JWT only, no OPA ──────────────────────────────────
  - id: ext-task-update
    uri: /fhir/Task/*
    methods: [PATCH]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      proxy-rewrite:
        regex_uri: ["^/fhir/Task/(.+)$", "/fhir/${PARTY}/Task/$1"]

  # ─── FHIR read by ID — OPA consent gate ──────────────────────────────
  - id: ext-fhir-read
    uri: /fhir/*
    methods: [GET]
    vars:
      - - "uri"
        - "~~"
        - "^/fhir/[^/]+/[^/]+$"
    priority: 5
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

  # ─── FHIR search — OPA consent gate, mandatory _id ───────────────────
  - id: ext-fhir-search
    uri: /fhir/*
    methods: [GET]
    vars:
      - - "uri"
        - "~~"
        - "^/fhir/[^/]+/?$"
    priority: 1
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "http://keycloak:8080/realms/umzh-connect/.well-known/openid-configuration"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      opa:
        host: "http://opa-${PARTY}:8181"
        policy: "umzh/authz/apisix"
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

upstreams:
  - id: hapi-${PARTY}
    nodes:
      "nginx-proxy:${NGINX_OWN_PORT}": 1
    type: roundrobin

  # Internal-only static-file server (nginx-proxy server block on port 85/86)
  # holding the party's JWK Set from services/keys/${PARTY}-l2.jwks.json.
  - id: jwks-${PARTY}
    nodes:
      "nginx-proxy:${JWKS_NGINX_PORT}": 1
    type: roundrobin

global_rules:
  - id: 1
    plugins:
      cors:
        allow_origins: "**"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,Accept,X-Tenant"
        expose_headers: "Content-Length,Content-Type"
        max_age: 43200
        allow_credential: true

#END
