routes:
  # ─── Health check ────────────────────────────────────────────────────
  - id: health
    uri: /__health
    methods: [GET]
    priority: 100
    plugins:
      serverless-pre-function:
        phase: access
        functions:
          - |
            return function(conf, ctx)
              ngx.header["Content-Type"] = "application/json"
              ngx.say('{"status":"ok"}')
              return ngx.exit(200)
            end

  # ─── FHIR Metadata — no auth ──────────────────────────────────────────
  - id: int-metadata
    uri: /fhir/metadata
    methods: [GET]
    priority: 20
    upstream_id: hapi-${PARTY}
    plugins:
      proxy-rewrite:
        uri: /fhir/${PARTY}/metadata

  # ─── Own FHIR data — JWT + realm-role + URL rewrite ──────────────────
  # Serves only this party's own partition. Cross-party access is no longer
  # proxied here — the web-app authenticates cross-domain calls itself (in-browser
  # client_credentials) and talks to the partner's external gateway directly.
  #
  # Two routes split by method so read-only 'user' tokens are accepted on GETs
  # while writes remain restricted to the party's own role (placer/fulfiller).

  - id: int-fhir-read
    uri: /fhir/*
    methods: [GET]
    priority: 2
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "${KEYCLOAK_DISCOVERY_URL}"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-role-check:
        allowed_roles: ["${PARTY}", "user"]
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

  # User-role permitted creates: ServiceRequest and Consent (POST only, higher priority)
  - id: int-fhir-servicerequest-create
    uri: /fhir/ServiceRequest
    methods: [POST]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "${KEYCLOAK_DISCOVERY_URL}"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-role-check:
        allowed_roles: ["${PARTY}", "user"]
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

  - id: int-fhir-consent-create
    uri: /fhir/Consent
    methods: [POST]
    priority: 10
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "${KEYCLOAK_DISCOVERY_URL}"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-role-check:
        allowed_roles: ["${PARTY}", "user"]
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

  - id: int-fhir-write
    uri: /fhir/*
    methods: [POST, PUT, PATCH, DELETE]
    priority: 1
    upstream_id: hapi-${PARTY}
    plugins:
      openid-connect:
        discovery: "${KEYCLOAK_DISCOVERY_URL}"
        bearer_only: true
        use_jwks: true
        set_access_token_header: true
        set_userinfo_header: false
        client_id: "unused"
        client_secret: "unused"
      umzh-role-check:
        required_role: "${PARTY}"
      proxy-rewrite:
        regex_uri: ["^/fhir/(.*)$", "/fhir/${PARTY}/$1"]

  # ─── OPA policy check passthrough (local diagnostic) ─────────────────
  - id: policy-check
    uri: /api/policy/check
    methods: [POST]
    upstream_id: opa-${PARTY}
    plugins:
      proxy-rewrite:
        uri: /v1/data/umzh/authz/allow

upstreams:
  - id: hapi-${PARTY}
    nodes:
      "nginx-proxy:${NGINX_OWN_PORT}": 1
    type: roundrobin

  - id: opa-${PARTY}
    nodes:
      "opa-${PARTY}:8181": 1
    type: roundrobin

global_rules:
  - id: 1
    plugins:
      cors:
        allow_origins: "**"
        allow_methods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
        allow_headers: "Authorization,Content-Type,Accept,X-Tenant"
        expose_headers: "Content-Length,Content-Type"
        max_age: 43200
        allow_credential: true

#END
