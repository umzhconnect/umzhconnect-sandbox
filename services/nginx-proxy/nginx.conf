# =============================================================================
# nginx-proxy -- nginx reverse proxy in front of HAPI FHIR (ports 80-83)
#                and rewriting proxy in front of external KrakenD gateways (ports 84-85)
#
# Ports 80-83: one server block per KrakenD gateway, each proxying directly to
# HAPI FHIR and applying sub_filter rules that rewrite URLs in every response body:
#
#   Port 80  -- placer   internal  (KrakenD 8080)
#               Rule 1: hapi self-links  localhost:8090/fhir/placer/    -> localhost:8080/fhir/
#               Rule 2: cross-party refs localhost:8083/fhir/           -> localhost:8080/proxy/fhir/
#
#   Port 81  -- placer   external  (KrakenD 8081)
#               Rule 1: hapi self-links  localhost:8090/fhir/placer/    -> localhost:8081/fhir/
#
#   Port 82  -- fulfiller internal (KrakenD 8082)
#               Rule 1: hapi self-links  localhost:8090/fhir/fulfiller/ -> localhost:8082/fhir/
#               Rule 2: cross-party refs localhost:8081/fhir/           -> localhost:8082/proxy/fhir/
#
#   Port 83  -- fulfiller external (KrakenD 8083)
#               Rule 1: hapi self-links  localhost:8090/fhir/fulfiller/ -> localhost:8083/fhir/
#
# Rule 2 on ports 80/82 is needed because tasks created by the partner are stored
# verbatim in the local HAPI partition with absolute references pointing to the
# creator's external gateway. When the owning party reads those tasks back through
# its own local gateway the cross-party references must be rewritten to the proxy
# path so the web-app can navigate them without a direct cross-origin call.
#
# Ports 84-85: dedicated rewriting proxies owned by the internal gateways for
# cross-party proxy reads. Each block forwards to the partner's external KrakenD
# gateway (enforcing that gateway's JWT validation) and then rewrites the
# external gateway's self-links in the response so the calling party's web-app
# can navigate references through its own /proxy/fhir/* path.
#
#   Port 84  -- placer   internal proxy reads fulfiller  external url -> localhost:8080/proxy/fhir/
#               Forwards to krakend-fulfiller-external; rewrites localhost:8083/fhir/
#   Port 85  -- fulfiller internal proxy reads placer    external url -> localhost:8082/proxy/fhir/
#               Forwards to krakend-placer-external;    rewrites localhost:8081/fhir/
#
# HAPI's server_address (set via HAPI_FHIR_BASE_URL) emits URLs of the form:
#   http://localhost:8090/fhir/{partition}/{resource}/{id}
# By the time a response reaches ports 84/85, nginx-proxy:81/83 has already
# rewritten those to localhost:8081/fhir/ or localhost:8083/fhir/ respectively.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Generous buffer sizes to handle large FHIR bundles without spilling to disk
    proxy_buffering         on;
    proxy_buffer_size       128k;
    proxy_buffers           16 128k;
    proxy_busy_buffers_size 256k;

    # Docker's embedded DNS resolver -- required for variable-based proxy_pass
    # on ports 84/85 so nginx defers hostname resolution to request time instead
    # of startup time (avoids circular dependency with the KrakenD external containers).
    resolver 127.0.0.11 valid=30s;

    # -----------------------------------------------------------------
    # Port 80 -- Placer internal gateway (KrakenD port 8080)
    # Rule 1: Rewrites placer partition HAPI self-links to the internal placer gateway.
    # Rule 2: Rewrites fulfiller external references stored inside locally held tasks
    #         (tasks created by the fulfiller) to the placer's /proxy/fhir/ path so
    #         the web-app can navigate them through the proxy instead of calling the
    #         fulfiller's external gateway directly.
    # -----------------------------------------------------------------
    server {
        listen 80;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/placer/"    "http://localhost:8080/fhir/";
            sub_filter "http://localhost:8083/fhir/"           "http://localhost:8080/proxy/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 81 -- Placer external gateway (KrakenD port 8081)
    # Rewrites placer partition self-links to the external placer gateway.
    # -----------------------------------------------------------------
    server {
        listen 81;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/placer/" "http://localhost:8081/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 82 -- Fulfiller internal gateway (KrakenD port 8082)
    # Rule 1: Rewrites fulfiller partition HAPI self-links to the internal fulfiller gateway.
    # Rule 2: Rewrites placer external references stored inside locally held tasks
    #         (tasks created by the placer) to the fulfiller's /proxy/fhir/ path so
    #         the web-app can navigate them through the proxy instead of calling the
    #         placer's external gateway directly.
    # -----------------------------------------------------------------
    server {
        listen 82;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/fulfiller/" "http://localhost:8082/fhir/";
            sub_filter "http://localhost:8081/fhir/"           "http://localhost:8082/proxy/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 83 -- Fulfiller external gateway (KrakenD port 8083)
    # Rewrites fulfiller partition self-links to the external fulfiller gateway.
    # -----------------------------------------------------------------
    server {
        listen 83;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/fulfiller/" "http://localhost:8083/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 84 -- Placer internal gateway, proxy path (/proxy/fhir/*)
    # Forwards to krakend-fulfiller-external (enforcing its JWT validation),
    # then rewrites fulfiller external self-links in the response body so
    # the placer web-app can navigate them through its own /proxy/fhir/ path.
    # -----------------------------------------------------------------
    server {
        listen 84;

        location / {
            # Variable-based proxy_pass: nginx resolves the hostname at request
            # time (via the resolver above) instead of at startup, breaking the
            # circular dependency with krakend-fulfiller-external.
            set $upstream_fulfiller_ext "krakend-fulfiller-external:8080";
            proxy_pass              http://$upstream_fulfiller_ext;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8083/fhir/" "http://localhost:8080/proxy/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 85 -- Fulfiller internal gateway, proxy path (/proxy/fhir/*)
    # Forwards to krakend-placer-external (enforcing its JWT validation),
    # then rewrites placer external self-links in the response body so
    # the fulfiller web-app can navigate them through its own /proxy/fhir/ path.
    # -----------------------------------------------------------------
    server {
        listen 85;

        location / {
            # Variable-based proxy_pass: nginx resolves the hostname at request
            # time (via the resolver above) instead of at startup, breaking the
            # circular dependency with krakend-placer-external.
            set $upstream_placer_ext "krakend-placer-external:8080";
            proxy_pass              http://$upstream_placer_ext;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8081/fhir/" "http://localhost:8082/proxy/fhir/";
        }
    }
}
