# =============================================================================
# nginx-proxy -- nginx reverse proxy in front of HAPI FHIR
#
# Ports 80-84 (per-gateway HAPI self-link rewriting) are NOT defined here. They
# live in templates/servers.conf.template, which the nginx image renders with
# envsubst to /etc/nginx/conf.d/servers.conf at container start so each
# sub_filter target picks up the per-environment gateway URL (VITE_*_URL).
# This file provides the http{} globals, includes that rendered config, and
# defines the port 85 onboarding gateway (which needs the http-level rate-limit
# zone). Keeping the port 80-84 blocks in one env-aware place avoids the trap of
# a hardcoded localhost copy shadowing the rendered one on non-local deployments.
#
#   Port 80  -- placer   internal   (VITE_PLACER_URL)
#   Port 81  -- placer   external    (VITE_PLACER_EXTERNAL_URL)
#   Port 82  -- fulfiller internal   (VITE_FULFILLER_URL)
#   Port 83  -- fulfiller external   (VITE_FULFILLER_EXTERNAL_URL)
#   Port 84  -- registry (public)    (VITE_REGISTRY_URL)
#   Port 85  -- onboarding API gateway (rate-limited)  [defined below]
#
# HAPI's server_address emits URLs of the form:
#   http://localhost:8090/fhir/{partition}/{resource}/{id}
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Rate-limit zone for self-service registration (keyed per client IP).
    # 2 requests/minute per IP with a burst allowance of 3.  Applied only on
    # the /register route so that /invites and /clients are unaffected.
    limit_req_zone $binary_remote_addr zone=register:10m rate=2r/m;
    limit_req_status 429;

    # Generous buffer sizes to handle large FHIR bundles without spilling to disk
    proxy_buffering         on;
    proxy_buffer_size       128k;
    proxy_buffers           16 128k;
    proxy_busy_buffers_size 256k;

    # Ports 80-84: per-gateway HAPI self-link rewriting, rendered from
    # templates/servers.conf.template with this environment's gateway URLs.
    include /etc/nginx/conf.d/servers.conf;

    # -----------------------------------------------------------------
    # Port 85 -- Onboarding API gateway (rate-limited)
    #
    # All onboarding traffic from the browser is routed through here so that
    # nginx enforces a per-IP rate limit on POST /register before the request
    # reaches the admin-api container.  Internal Docker-network callers
    # (e.g. test scripts) can still reach admin-api:9000 directly.
    # -----------------------------------------------------------------
    server {
        listen 85;

        # POST /register is the only public, unauthenticated endpoint — cap it
        # tightly.  burst=3 absorbs momentary spikes (e.g. a page reload that
        # retries once); nodelay means excess requests are rejected immediately
        # rather than queued.
        location = /register {
            limit_req zone=register burst=3 nodelay;

            proxy_pass              http://admin-api:9000;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other onboarding endpoints (/invites, /clients, /health) are
        # admin-token-gated at the application layer — no extra rate limit needed.
        location / {
            proxy_pass              http://admin-api:9000;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
