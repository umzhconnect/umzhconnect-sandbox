# =============================================================================
# nginx-proxy -- events block + http wrapper.
# Server blocks live in templates/servers.conf.template and are rendered by
# envsubst into /etc/nginx/conf.d/ at container start (nginx:alpine built-in).
# Gateway URLs are injected via environment variables from .env.
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Generous buffer sizes to handle large FHIR bundles without spilling to disk
    proxy_buffering         on;
    proxy_buffer_size       128k;
    proxy_buffers           16 128k;
    proxy_busy_buffers_size 256k;

    include /etc/nginx/conf.d/servers.conf;
}
