# =============================================================================
# nginx-proxy -- nginx reverse proxy in front of HAPI FHIR (ports 80-83)
#
# One server block per APISIX gateway. Each block proxies to HAPI FHIR and
# applies a single sub_filter rule that rewrites HAPI's raw partition self-links
# to the correct APISIX gateway base URL:
#
#   Port 80  -- placer   internal  (APISIX port 8080)
#               hapi self-links  localhost:8090/fhir/placer/    -> localhost:8080/fhir/
#
#   Port 81  -- placer   external  (APISIX port 8081)
#               hapi self-links  localhost:8090/fhir/placer/    -> localhost:8081/fhir/
#
#   Port 82  -- fulfiller internal (APISIX port 8082)
#               hapi self-links  localhost:8090/fhir/fulfiller/ -> localhost:8082/fhir/
#
#   Port 83  -- fulfiller external (APISIX port 8083)
#               hapi self-links  localhost:8090/fhir/fulfiller/ -> localhost:8083/fhir/
#
#   Port 84  -- registry (public, no auth)
#               rewrites incoming /fhir/* to /fhir/registry/* on HAPI
#               hapi self-links  localhost:8090/fhir/registry/ -> localhost:8084/fhir/
#
# JWKS publication moved to the per-party key custodians (services/key-custodian/).
# The external APISIX gateways now proxy their public /jwks.json route directly
# to key-custodian-{party}:8000/jwks.json. nginx-proxy no longer touches keys.
#
# HAPI's server_address emits URLs of the form:
#   http://localhost:8090/fhir/{partition}/{resource}/{id}
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Rate-limit zone for self-service registration (keyed per client IP).
    # 2 requests/minute per IP with a burst allowance of 3.  Applied only on
    # the /register route so that /invites and /clients are unaffected.
    limit_req_zone $binary_remote_addr zone=register:10m rate=2r/m;
    limit_req_status 429;

    # Generous buffer sizes to handle large FHIR bundles without spilling to disk
    proxy_buffering         on;
    proxy_buffer_size       128k;
    proxy_buffers           16 128k;
    proxy_busy_buffers_size 256k;

    # -----------------------------------------------------------------
    # Port 80 -- Placer internal gateway (APISIX port 8080)
    # Rewrites placer partition HAPI self-links to the internal placer gateway.
    # -----------------------------------------------------------------
    server {
        listen 80;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/placer/" "http://localhost:8080/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 81 -- Placer external gateway (APISIX port 8081)
    # Rewrites placer partition self-links to the external placer gateway.
    # -----------------------------------------------------------------
    server {
        listen 81;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/placer/" "http://localhost:8081/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 82 -- Fulfiller internal gateway (APISIX port 8082)
    # Rewrites fulfiller partition HAPI self-links to the internal fulfiller gateway.
    # -----------------------------------------------------------------
    server {
        listen 82;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/fulfiller/" "http://localhost:8082/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 83 -- Fulfiller external gateway (APISIX port 8083)
    # Rewrites fulfiller partition self-links to the external fulfiller gateway.
    # -----------------------------------------------------------------
    server {
        listen 83;

        location / {
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/fulfiller/" "http://localhost:8083/fhir/";
        }
    }

    # -----------------------------------------------------------------
    # Port 85 -- Onboarding API gateway (rate-limited)
    #
    # All onboarding traffic from the browser is routed through here so that
    # nginx enforces a per-IP rate limit on POST /register before the request
    # reaches the onboarding-api container.  Internal Docker-network callers
    # (e.g. test scripts) can still reach onboarding-api:9002 directly.
    # -----------------------------------------------------------------
    server {
        listen 85;

        # POST /register is the only public, unauthenticated endpoint — cap it
        # tightly.  burst=3 absorbs momentary spikes (e.g. a page reload that
        # retries once); nodelay means excess requests are rejected immediately
        # rather than queued.
        location = /register {
            limit_req zone=register burst=3 nodelay;

            proxy_pass              http://admin-api:9000;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other onboarding endpoints (/invites, /clients, /health) are
        # admin-token-gated at the application layer — no extra rate limit needed.
        location / {
            proxy_pass              http://admin-api:9000;
            proxy_set_header        Host            $host;
            proxy_set_header        X-Real-IP       $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # -----------------------------------------------------------------
    # Port 84 -- Registry gateway (public, no auth)
    # Rewrites /fhir/* → /fhir/registry/* on HAPI and fixes self-links.
    # -----------------------------------------------------------------
    server {
        listen 84;

        location /fhir/ {
            rewrite ^/fhir/(.*)$ /fhir/registry/$1 break;
            proxy_pass              http://hapi-fhir:8080;
            proxy_set_header        Host               $host;
            proxy_set_header        X-Real-IP          $remote_addr;
            proxy_set_header        X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header        Accept-Encoding    "";

            sub_filter_once  off;
            sub_filter_types *;
            sub_filter "http://localhost:8090/fhir/registry/" "http://localhost:8084/fhir/";
        }
    }


}
